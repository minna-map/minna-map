name: 60 Sites Auto Update
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' } # 2026年の推奨バージョンへ
      - name: Install Latest SDK
        run: pip install -U google-genai # 最新の道具を導入
      - name: Run Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_60_sites.py
      - name: Save Results
        run: |
          git config --global user.name "Analyst-Bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "Updated to Modern SDK" || exit 0
          git push
