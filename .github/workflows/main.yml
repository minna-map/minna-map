name: 60 Sites Auto Update
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - name: Update Tools # ここでロボットの知識を最新にします
        run: pip install -U google-generativeai
      - name: Run Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_60_sites.py
      - name: Commit and Push
        run: |
          git config --global user.name "Analyst-Bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "Auto Update 2026-03-23" || exit 0
          git push
