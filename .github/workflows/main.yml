name: 60 Sites Auto Update
on:
  schedule:
    - cron: '0 20 * * *' # 毎日日本時間の朝5時に動くよ
  workflow_dispatch: # ボタンを押して今すぐ動かすこともできるよ
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - name: Install dependencies
        run: pip install google-generativeai atproto tweepy
      - name: Run Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_60_sites.py
      - name: Run Sitemap Generator
        run: python scripts/generate_sitemap.py
      - name: Run SNS Notifier
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: python scripts/notify_sns.py
      - name: Commit and Push
        run: |
          git config --global user.name "Analyst-Bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "Daily Auto Update 2026-03-23" || exit 0
          git push
